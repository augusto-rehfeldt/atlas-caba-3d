<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#172428">
  <link rel="icon" href="data:,">
  <title>Atlas CABA 3D</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <canvas id="map" aria-label="Mapa isométrico interactivo de la Ciudad de Buenos Aires"></canvas>
    <nav class="navbar" aria-label="Mapa y controles">
      <strong class="brand"><span>ATLAS CABA 3D</span><b id="area-title">CABA</b></strong>
      <label class="area-picker"><span>Área</span><select id="area" aria-label="Elegir barrio"></select></label>
      <label class="style-picker"><span>Estilo</span><select id="style" aria-label="Máscara visual"><option value="real">Real</option><option value="vivid">Vivo</option><option value="warm">Cálido</option><option value="mono">Plano</option><option value="future">Futurista</option><option value="animated">Animado</option></select></label>
      <span class="nav-status" aria-live="polite"><strong id="status">Preparando CABA</strong><small id="detail">Cargando mapa guardado…</small></span>
      <label class="rotation-control"><span>ROTAR</span><input id="rotation" type="range" min="-180" max="180" step="1" value="0" aria-label="Rotación del mapa en grados"></label>
      <span class="controls" aria-label="Controles del mapa">
        <button id="minus" type="button" aria-label="Alejar">−</button>
        <button id="reset" type="button">CENTRAR</button>
        <button id="theme" type="button">NOCHE</button>
        <button id="plus" type="button" aria-label="Acercar">+</button>
      </span>
    </nav>
    <footer>Fotografía aérea 2021 © GCBA · CC BY 2.5 AR</footer>
  </main>
  <script src="data/barrios-index.js"></script>
  <script src="data/caba-render.js"></script>
  <script src="data/area-renders.js"></script>
  <script src="data-loader.js"></script>
  <script src="app.js"></script>
</body>
</html>
